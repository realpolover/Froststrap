name: Auto-Translate with DeepLX

on:
  push:
    paths:
      - 'Froststrap/Resources/Strings.resx'
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Start DeepLX
        run: |
          docker run -d --name deeplx -p 1188:1188 ghcr.io/owo-network/deeplx:latest
          sleep 5

      - name: Run translation
        run: python Scripts/Translations/translate_deeplx.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "chore: auto-translate resources with DeepLX"
          title: "Auto-Translate Strings"
          body: |
            This PR auto-translates strings using DeepLX.
            
            Please review the translations for accuracy.
          branch: auto-translate-deeplx
          base: main
          delete-branch: true
          labels: automated, translation