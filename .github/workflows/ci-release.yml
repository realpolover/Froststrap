name: Build (Release)
on: [push, pull_request]
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - uses: extractions/setup-just@v3
      - name: Install NSIS
        uses: negrutiu/nsis-install@v2
      - name: Set short SHA
        run: echo "SHORT_SHA=$("${{ github.sha }}".Substring(0, 7))" >> $env:GITHUB_ENV
      - name: Build and package
        run: just ci-publish-windows
      - uses: actions/upload-artifact@v6
        with:
          name: froststrap-release-win-x64-${{ env.SHORT_SHA }}
          path: build/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
      - uses: DeterminateSystems/nix-installer-action@v14
      - name: Build and package
        run: nix develop -c just ci-publish-macos
      - name: Remove quarantine from artifacts
        run: |
          xattr -rd com.apple.quarantine build/Froststrap-macOS.dmg 2>/dev/null || true
      - uses: actions/upload-artifact@v6
        with:
          name: froststrap-release-macos-universal-${{ env.SHORT_SHA }}
          path: build/*

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - uses: extractions/setup-just@v2
      - uses: DeterminateSystems/nix-installer-action@v14
      - name: Build and package
        run: just ci-publish-linux
      - uses: actions/upload-artifact@v6
        with:
          name: froststrap-release-linux-x64-${{ env.SHORT_SHA }}
          path: build/*

  build-flatpak:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: flatpak/io.github.froststrap.yml
          cache-key: flatpak-builder-${{ hashFiles('flatpak/io.github.froststrap.yml', '**/*.csproj', '**/packages.lock.json') }}
          bundle: Froststrap-linux-x64.flatpak
      - uses: actions/upload-artifact@v6
        with:
          name: froststrap-flatpak-x64-${{ env.SHORT_SHA }}
          path: Froststrap-linux-x64.flatpak

  release:
    needs: [build-windows, build-macos, build-linux, build-flatpak]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: froststrap-release-win-x64-${{ env.SHORT_SHA }}
          path: release
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: froststrap-release-macos-universal-${{ env.SHORT_SHA }}
          path: release
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: froststrap-release-linux-x64-${{ env.SHORT_SHA }}
          path: release
      - name: Download Flatpak artifact
        uses: actions/download-artifact@v4
        with:
          name: froststrap-flatpak-x64-${{ env.SHORT_SHA }}
          path: release
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          draft: true
          files: |
            release/Froststrap-Setup.exe
            release/Froststrap-SelfContained-Setup.exe
            release/Froststrap-macOS.dmg
            release/Froststrap-linux-x64.AppImage
            release/Froststrap-linux-x64.deb
            release/Froststrap-linux-x64.rpm
            release/Froststrap-linux-x64.flatpak
          name: Froststrap ${{ github.ref_name }}
          fail_on_unmatched_files: true