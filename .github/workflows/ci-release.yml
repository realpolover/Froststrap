name: Build (Release)
on: [push, pull_request]
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - uses: extractions/setup-just@v3
      - name: Install NSIS
        uses: negrutiu/nsis-install@v2
      - name: Set short SHA
        run: echo "SHORT_SHA=$("${{ github.sha }}".Substring(0, 7))" >> $env:GITHUB_ENV
      - name: Build and package
        run: just ci-publish-windows
      - uses: actions/upload-artifact@v6
        with:
          name: froststrap-release-win-x64-${{ env.SHORT_SHA }}
          path: build/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
      - uses: DeterminateSystems/nix-installer-action@v14
      - name: Build and package
        run: nix develop -c just ci-publish-macos
      - name: Remove quarantine from artifacts
        run: |
          xattr -rd com.apple.quarantine build/Froststrap-macOS.dmg 2>/dev/null || true
      - uses: actions/upload-artifact@v6
        with:
          name: froststrap-release-macos-universal-${{ env.SHORT_SHA }}
          path: build/*

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
      - uses: DeterminateSystems/nix-installer-action@v14
      - name: Build and package
        run: env -u SOURCE_DATE_EPOCH nix develop -c just ci-publish-linux
      - uses: actions/upload-artifact@v6
        with:
          name: froststrap-release-linux-x64-${{ env.SHORT_SHA }}
          path: build/*

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: froststrap-release-win-x64-${{ env.SHORT_SHA }}
          path: release
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: froststrap-release-macos-universal-${{ env.SHORT_SHA }}
          path: release
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          draft: true
          files: |
            release/Froststrap-Setup.exe
            release/Froststrap-macOS.dmg
          name: Froststrap ${{ github.ref_name }}
          fail_on_unmatched_files: true
